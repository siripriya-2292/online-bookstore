<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f1ea;
    overflow:hidden;
}

/* Background */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#d6b98c;
    border-radius:50%;
    top:-150px;
    left:-150px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#8b5e34;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    opacity:0.2;
}

/* Main Box */

.profile-box{
    position:relative;
    width:950px;
    height:620px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    z-index:10;
}

/* Left Section */

.left-section{
    width:40%;
    background:linear-gradient(to bottom right,#5a3e2b,#8b5e34);
    color:white;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left-section h1{
    font-size:42px;
    margin-bottom:20px;
}

.left-section p{
    font-size:16px;
    line-height:1.8;
    color:#f1e9dc;
}

/* Right Section */

.right-section{
    width:60%;
    padding:40px;
    overflow-y:auto;
    text-align:center;
}

/* Avatar */

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#8b5e34;
    color:white;
    font-size:38px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 20px;
    font-weight:600;
}

/* Heading */

.right-section h2{
    color:#5a3e2b;
    margin-bottom:30px;
    font-size:34px;
}

/* Profile Card */

.profile-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:20px;
    padding:25px;
    text-align:left;
}

/* Profile Items */

.profile-item{
    margin-bottom:22px;
    display:flex;
    flex-direction:column;
}

.label{
    color:#777;
    font-size:14px;
    margin-bottom:6px;
}

.value{
    color:#333;
    font-size:18px;
    font-weight:500;
}

/* Buttons */

.button-group{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

/* Common Button */

.profile-btn,
.home-btn,
.logout-btn,
.wishlist-btn{
    padding:14px 22px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    text-decoration:none;
    font-size:15px;
    transition:0.3s;
    font-weight:500;
}

/* Edit + Orders */

.profile-btn{
    background:#8b5e34;
    color:white;
}

.profile-btn:hover{
    background:#5a3e2b;
    transform:translateY(-2px);
}

/* Wishlist */

.wishlist-btn{
    background:#ffe6ee;
    color:#d63384;
}

.wishlist-btn:hover{
    background:#d63384;
    color:white;
}

/* Home */

.home-btn{
    background:#f1f1f1;
    color:#444;
}

.home-btn:hover{
    background:#ddd;
}

/* Logout */

.logout-btn{
    background:#ffeded;
    color:#d63031;
}

.logout-btn:hover{
    background:#d63031;
    color:white;
}
</style>
</head>

<body>

<div class="profile-box">

    <!-- Left Section -->

    <div class="left-section">

        <h1>BookHaven</h1>

        <p>
            Manage your profile, wishlist, and orders all in one place.
        </p>

    </div>

    <!-- Right Section -->

    <div class="right-section">

        <!-- Avatar -->

        <div class="avatar">
            U
        </div>

        <h2>My Profile</h2>

        <!-- Profile Details -->

        <div class="profile-card">

            <div class="profile-item">
                <span class="label">Name</span>
                <span class="value" id="name">User</span>
            </div>

            <div class="profile-item">
                <span class="label">Email</span>
                <span class="value" id="email">user@email.com</span>
            </div>

            <div class="profile-item">
                <span class="label">Phone</span>
                <span class="value" id="phone">0000000000</span>
            </div>

        </div>

        <!-- Buttons -->

        <div class="button-group">

            <button class="profile-btn" onclick="editProfile()">
                ✏️ Edit Profile
            </button>

            <button class="profile-btn" onclick="goOrders()">
                📦 My Orders
            </button>

            <a class="wishlist-btn" href="wishlist.html">
                ❤️ My Wishlist
            </a>

            <a class="home-btn" href="homepage.html">
                🏠 Back to Store
            </a>

            <button class="logout-btn" onclick="logout()">
                🚪 Logout
            </button>

        </div>

    </div>

</div>

<script>

function logout(){

    localStorage.removeItem("user");

    alert("Logged out");

    window.location.href = "week2.html";
}

function editProfile(){

    let user = JSON.parse(localStorage.getItem("user")) || {};

    let newName = prompt("Enter name", user.name);
    let newEmail = prompt("Enter email", user.email);
    let newPhone = prompt("Enter phone", user.phone);

    user.name = newName;
    user.email = newEmail;
    user.phone = newPhone;

    localStorage.setItem("user", JSON.stringify(user));

    location.reload();
}

function goOrders(){

    window.location.href = "orders.html";

}

</script>

</body>
</html>
