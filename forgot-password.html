<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f1ea;
    overflow: hidden;
}

/* Background Circles */

body::before{
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: #d6b98c;
    border-radius: 50%;
    top: -150px;
    left: -150px;
    opacity: 0.4;
}

body::after{
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: #8b5e34;
    border-radius: 50%;
    bottom: -120px;
    right: -120px;
    opacity: 0.2;
}

/* Forgot Password Box */

.forgot-box{
    position: relative;
    width: 850px;
    height: 450px;
    background: white;
    border-radius: 25px;
    overflow: hidden;
    display: flex;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    z-index: 10;
}

/* Left Section */

.left-section{
    width: 50%;
    background: linear-gradient(to bottom right, #5a3e2b, #8b5e34);
    color: white;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left-section h1{
    font-size: 40px;
    margin-bottom: 15px;
}

.left-section p{
    font-size: 16px;
    line-height: 1.7;
    color: #f1e9dc;
}

/* Right Section */

.right-section{
    width: 50%;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right-section h2{
    color: #5a3e2b;
    margin-bottom: 20px;
    font-size: 30px;
}

.right-section p{
    color: gray;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 25px;
}

/* Input */

.input-group{
    margin-bottom: 20px;
}

.input-group input{
    width: 100%;
    padding: 15px;
    border: none;
    border-bottom: 2px solid #dcdcdc;
    outline: none;
    font-size: 15px;
    transition: 0.3s;
    background: transparent;
}

.input-group input:focus{
    border-color: #8b5e34;
}

/* Button */

.reset-btn{
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 30px;
    background: #8b5e34;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.reset-btn:hover{
    background: #5a3e2b;
    transform: scale(1.02);
}

/* Back Link */

.back-link{
    margin-top: 20px;
    text-align: center;
}

.back-link a{
    text-decoration: none;
    color: #8b5e34;
    font-weight: 600;
}

.back-link a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="forgot-box">

    <!-- Left Side -->

    <div class="left-section">

        <h1>BookHaven</h1>

        <p>
            Forgot your password?  
            Don't worry — reset it quickly and continue exploring your favorite books and collections.
        </p>

    </div>

    <!-- Right Side -->

    <div class="right-section">

        <h2>Reset Password</h2>

        <p>
            Enter your registered email address to receive a password reset link.
        </p>

        <form action="week2.html" method="get">

            <div class="input-group">
                <input type="email" placeholder="Enter your email" required>
            </div>

            <button class="reset-btn">Send Reset Link</button>

        </form>

        <div class="back-link">
            <a href="week2.html">← Back to Login</a>
        </div>

    </div>

</div>

</body>
</html>
