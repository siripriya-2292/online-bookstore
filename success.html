<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f1ea;
    overflow:hidden;
}

/* Background Circles */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#d6b98c;
    border-radius:50%;
    top:-150px;
    left:-150px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#8b5e34;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    opacity:0.2;
}

/* Main Box */

.success-box{
    position:relative;
    width:900px;
    height:600px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    z-index:10;
}

/* Left Section */

.left-section{
    width:40%;
    background:linear-gradient(to bottom right,#5a3e2b,#8b5e34);
    color:white;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left-section h1{
    font-size:40px;
    margin-bottom:20px;
}

.left-section p{
    font-size:16px;
    line-height:1.8;
    color:#f1e9dc;
}

/* Right Section */

.right-section{
    width:60%;
    padding:50px;
    overflow-y:auto;
    text-align:center;
}

/* Success Icon */

.success-icon{
    font-size:65px;
    margin-bottom:20px;
}

/* Heading */

.right-section h2{
    color:#5a3e2b;
    font-size:34px;
    margin-bottom:10px;
}

.message{
    color:gray;
    margin-bottom:30px;
}

/* Summary Box */

#summary{
    text-align:left;
}

/* Order Heading */

#summary h3{
    color:#5a3e2b;
    margin-bottom:20px;
}

/* Order Item */

.order-item{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:15px;
    padding:16px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.order-item span{
    color:#333;
    font-weight:500;
}

.order-item b{
    color:#8b5e34;
}

/* Total */

.final-total{
    margin-top:25px;
    font-size:24px;
    font-weight:600;
    color:#5a3e2b;
}

/* Payment */

.payment-method{
    margin-top:12px;
    color:#666;
    font-size:15px;
}

/* Home Button */

.home-btn{
    display:inline-block;
    margin-top:35px;
    padding:14px 28px;
    background:#8b5e34;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}

.home-btn:hover{
    background:#5a3e2b;
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="success-box">

    <!-- Left Section -->

    <div class="left-section">

        <h1>🎉 Order Confirmed</h1>

        <p>
            Your books are on their way!  
            Thank you for shopping with BookHaven.
        </p>

    </div>

    <!-- Right Section -->

    <div class="right-section">

        <div class="success-icon">
            ✅
        </div>

        <h2>Order Placed Successfully</h2>

        <p class="message">
            Thank you for shopping with us 😊
        </p>

        <div id="summary"></div>

        <a href="homepage.html" class="home-btn">
            Explore More Books
        </a>

    </div>

</div>

<script>
let order = JSON.parse(localStorage.getItem("lastOrder"));

let box = document.getElementById("summary");

if(order){

    let html = "<h3>Order Summary</h3>";

    order.items.forEach(item => {

        html += `
        <div class="order-item">
            <span>${item.name}</span>
            <b>₹ ${item.price}</b>
        </div>
        `;

    });

    html += `
        <div class="final-total">
            Total: ₹ ${order.total}
        </div>

        <div class="payment-method">
            Payment: ${order.payment.toUpperCase()}
        </div>
    `;

    box.innerHTML = html;

}else{

    box.innerHTML = "<p>No order found</p>";

}
</script>

<br>


</body>
</html>
