<html>
<head>
<title>Online Book Store</title>
<script src="bookscript.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:#f4f1ea;
    padding:20px;
}

/* ================= TOP BAR ================= */

.top-bar{
    background:white;
    padding:20px 30px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    margin-bottom:30px;
    flex-wrap:wrap;
}

.title{
    color:#5a3e2b;
    font-size:30px;
}

/* ================= SEARCH BOX ================= */

.search-box input{
    width:300px;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    outline:none;
    background:#f1f1f1;
    font-size:15px;
    transition:0.3s;
}

.search-box input:focus{
    background:white;
    box-shadow:0 0 5px rgba(139,94,52,0.3);
}

/* ================= TOP RIGHT BUTTONS ================= */

.top-right{
    display:flex;
    gap:15px;
}

.profile-btn,
.cart-btn{
    padding:12px 20px;
    border:none;
    border-radius:30px;
    background:#8b5e34;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.profile-btn:hover,
.cart-btn:hover{
    background:#5a3e2b;
    transform:translateY(-2px);
}

/* ================= SECTION TITLES ================= */

.genre-title{
    font-size:28px;
    color:#5a3e2b;
    margin:40px 0 20px;
    padding-left:10px;
}

/* ================= BOOK CONTAINER ================= */

.book-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

/* ================= BOOK CARD ================= */

.book-card{
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.3s;
}

.book-card:hover{
    transform:translateY(-8px);
}

.book-card img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:15px;
}

/* ================= BOOK DETAILS ================= */

.book-title{
    font-size:18px;
    font-weight:600;
    color:#333;
    margin-bottom:10px;
}

.price{
    color:#8b5e34;
    font-size:18px;
    font-weight:600;
    margin-bottom:15px;
}

/* ================= BUTTONS ================= */

.btn,
.book-card button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin-top:10px;
    font-size:14px;
    transition:0.3s;
}

.btn{
    background:#8b5e34;
    color:white;
}

.btn:hover{
    background:#5a3e2b;
}

.book-card button:last-child{
    background:#f1f1f1;
    color:#333;
}

.book-card button:last-child:hover{
    background:#ffd6de;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .top-bar{
        flex-direction:column;
        gap:20px;
    }

    .search-box input{
        width:100%;
    }

}
@keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.5); }
    100% { transform: scale(1); }
}

.pop {
    animation: pop 0.3s ease;
}


</style>
</head>
