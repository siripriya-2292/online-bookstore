<!DOCTYPE html>
<html>
<head>
<title>BookHaven Cart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f1ea;
    overflow:hidden;
    padding:20px;
}

/* Background Circles */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#d6b98c;
    border-radius:50%;
    top:-150px;
    left:-150px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#8b5e34;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    opacity:0.2;
}

/* Main Cart Box */

.cart-page{
    position:relative;
    width:850px;
    min-height:550px;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    z-index:10;
    overflow-y:auto;
}

/* Header */

.cart-header{
    text-align:center;
    margin-bottom:30px;
}

.cart-header h1{
    color:#5a3e2b;
    font-size:38px;
    margin-bottom:10px;
}

.cart-header p{
    color:gray;
    font-size:15px;
}

/* Buttons */

.cart-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.clear-btn,
.buy-btn{
    padding:14px 28px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
    font-weight:500;
}

/* Clear */

.clear-btn{
    background:#f1f1f1;
    color:#444;
}

.clear-btn:hover{
    background:#ddd;
}

/* Buy */

.buy-btn{
    background:#8b5e34;
    color:white;
}

.buy-btn:hover{
    background:#5a3e2b;
    transform:translateY(-2px);
}

/* Cart Container */

#cartContainer{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* Cart Item */

.item{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:18px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.item:hover{
    transform:translateY(-4px);
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* Book Name */

.item span{
    font-size:18px;
    font-weight:600;
    color:#333;
}

/* Price */

.item small{
    color:#8b5e34;
    font-size:15px;
    font-weight:600;
}

/* Remove Button */

.remove{
    background:#ffeded;
    color:#d63031;
    border:none;
    padding:10px 18px;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

.remove:hover{
    background:#d63031;
    color:white;
}

/* Total */

#total{
    margin-top:30px;
    text-align:right;
    color:#5a3e2b;
    font-size:30px;
}
</style>
</head>

<body>

<div class="cart-page">

    <div class="cart-header">
        <h1>🛒 Your Cart</h1>
        <p>Your selected books are waiting for you</p>
    </div>

    <div class="cart-buttons">

        <button class="clear-btn" onclick="clearCart()">
            Clear Cart
        </button>

        <button class="buy-btn" onclick="buyNow()">
            Buy Now
        </button>

    </div>

    <div id="cartContainer"></div>

    <h2 id="total"></h2>

</div>

<script>
function buyNow() {
    localStorage.setItem("orderStatus", "buying");
    window.location.href = "checkout.html";
}
</script>

<script src="bookscript.js"></script>

</body>
</html>
