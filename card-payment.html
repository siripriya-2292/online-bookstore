<!DOCTYPE html>
<html>
<head>
<title>Card Payment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f1ea;
    overflow:hidden;
}

/* Background */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#d6b98c;
    border-radius:50%;
    top:-150px;
    left:-150px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#8b5e34;
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    opacity:0.2;
}

/* Main Box */

.payment-box{
    position:relative;
    width:900px;
    height:550px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    z-index:10;
}

/* Left Section */

.left-section{
    width:40%;
    background:linear-gradient(to bottom right,#5a3e2b,#8b5e34);
    color:white;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left-section h1{
    font-size:42px;
    margin-bottom:20px;
}

.left-section p{
    font-size:16px;
    line-height:1.8;
    color:#f1e9dc;
}

/* Right Section */

.right-section{
    width:60%;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* Icon */

.card-icon{
    font-size:60px;
    text-align:center;
    margin-bottom:15px;
}

/* Heading */

.right-section h2{
    text-align:center;
    color:#5a3e2b;
    font-size:34px;
    margin-bottom:10px;
}

.payment-text{
    text-align:center;
    color:gray;
    margin-bottom:30px;
    line-height:1.6;
}

/* Inputs */

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:none;
    border-bottom:2px solid #ddd;
    outline:none;
    font-size:15px;
    transition:0.3s;
    background:transparent;
}

.input-group input:focus{
    border-color:#8b5e34;
}

/* Row */

.card-row{
    display:flex;
    gap:20px;
}

.small{
    width:50%;
}

/* Button */

.pay-btn{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:30px;
    background:#8b5e34;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn:hover{
    background:#5a3e2b;
    transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="payment-box">

    <!-- Left Section -->

    <div class="left-section">

        <h1>BookHaven</h1>

        <p>
            Securely complete your payment using your debit or credit card and continue exploring your favorite books.
        </p>

    </div>

    <!-- Right Section -->

    <div class="right-section">

        <div class="card-icon">
            💳
        </div>

        <h2>Card Payment</h2>

        <p class="payment-text">
            Enter your card details to complete your purchase securely.
        </p>

        <!-- Form -->

        <div class="input-group">
            <input type="text" placeholder="Card Number">
        </div>

        <div class="input-group">
            <input type="text" placeholder="Card Holder Name">
        </div>

        <div class="card-row">

            <div class="input-group small">
                <input type="text" placeholder="Expiry Date">
            </div>

            <div class="input-group small">
                <input type="password" placeholder="CVV">
            </div>

        </div>

        <button class="pay-btn" onclick="payCard()">
            Complete Payment
        </button>

    </div>

</div>

<script>
function payCard(){

    alert("Payment Successful via Card 💳");

    window.location.href = "success.html";

}
</script>

</body>
</html>
